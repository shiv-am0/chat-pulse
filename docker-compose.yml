name: chatpulse

services:

  # ── Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: chatpulse-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # - certbot-webroot:/var/www/certbot
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - chatpulse-network
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Django API ──────────────────────────────────────
  api:
    build:
      context: ./backend
    image: ghcr.io/${GHCR_USER:-your-gh-username}/chatpulse-api:latest
    container_name: chatpulse-api
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on: {}
    networks:
      - chatpulse-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - staticfiles:/app/staticfiles
      - ./deploy/aiven-ca.pem:/app/certs/ca.pem:ro

  # ── Kafka Consumer (separate process) ───────────────
  kafka-consumer:
    build:
      context: ./backend
    image: ghcr.io/${GHCR_USER:-your-gh-username}/chatpulse-api:latest
    container_name: chatpulse-kafka-consumer
    restart: unless-stopped
    command: python manage.py run_kafka_consumer
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - ./deploy/aiven-ca.pem:/app/certs/ca.pem:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - chatpulse-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ── PostgreSQL ──────────────────────────────────────
  postgres:
    profiles: ["local"]
    image: postgres:15
    container_name: chatpulse-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: chatpulse
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatpulse-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d chatpulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis ───────────────────────────────────────────
  redis:
    profiles: ["local"]
    image: redis/redis-stack:latest
    container_name: chatpulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    networks:
      - chatpulse-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Zookeeper ───────────────────────────────────────
  zookeeper:
    profiles: ["local"]
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: chatpulse-zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - chatpulse-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Kafka ───────────────────────────────────────────
  kafka:
    profiles: ["local"]
    image: confluentinc/cp-kafka:7.4.0
    container_name: chatpulse-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    networks:
      - chatpulse-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Monitoring UIs ──────────────────────────────────
  kafka-ui:
    profiles: ["local"]
    image: provectuslabs/kafka-ui:latest
    container_name: chatpulse-kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
    networks:
      - chatpulse-network

  pgadmin:
    profiles: ["local"]
    image: dpage/pgadmin4:latest
    container_name: chatpulse-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@chatpulse.com
      PGADMIN_DEFAULT_PASSWORD: password
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - chatpulse-network

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  pgadmin_data:
  staticfiles:
  certbot-webroot:

networks:
  chatpulse-network:
    driver: bridge
